<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local OCR Startup Error</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fbf7f2;
        --surface: #fffdf9;
        --border: #e7dccf;
        --text: #111827;
        --muted: #6f6257;
        --accent: #cc785c;
        --danger: #dc2626;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #171310;
          --surface: #221b17;
          --border: #3a2e28;
          --text: #f8f3ed;
          --muted: #b2a59a;
          --accent: #ea9d7c;
          --danger: #f87171;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        font-family: Inter, Geist, system-ui, sans-serif;
        background: linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 85%, var(--surface)) 100%);
        color: var(--text);
      }

      .panel {
        width: min(640px, 100%);
        padding: 28px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow: 0 18px 48px rgba(86, 52, 33, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 30px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      pre {
        margin: 0;
        padding: 16px;
        overflow: auto;
        border-radius: 14px;
        background: color-mix(in srgb, var(--surface) 86%, var(--bg));
        border: 1px solid var(--border);
        color: var(--danger);
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        min-height: 44px;
        padding: 10px 16px;
        border-radius: 10px;
        border: 0;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 72%, black));
        color: #fff;
      }

      .secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <div class="stack">
        <h1>Local OCR could not start</h1>
        <p>
          The desktop shell could not start the local OCR backend. In most cases
          this means Docker Desktop is not installed, not running, or the OCR
          container failed to build.
        </p>
        <pre id="message"></pre>
        <div class="actions">
          <button id="retry-button" class="primary" type="button">Retry startup</button>
          <button id="open-docker-button" class="secondary" type="button">Open Docker Desktop</button>
          <button id="docker-button" class="secondary" type="button">Download Docker Desktop</button>
        </div>
      </div>
    </section>

    <script>
      const params = new URLSearchParams(window.location.search);
      const message = params.get("message") || "Unknown startup error.";
      document.getElementById("message").textContent = message;

      document.getElementById("retry-button").addEventListener("click", async () => {
        await window.desktopApp.retryStartup();
      });

      document.getElementById("open-docker-button").addEventListener("click", async () => {
        await window.desktopApp.openDockerDesktop();
      });

      document.getElementById("docker-button").addEventListener("click", async () => {
        await window.desktopApp.openDockerDownload();
      });
    </script>
  </body>
</html>
