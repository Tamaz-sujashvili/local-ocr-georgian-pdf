<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local OCR</title>
    <link rel="icon" type="image/png" href="../assets/icons/icon.png" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fc;
        --surface: #ffffff;
        --border: #dbe4f4;
        --text: #0f172a;
        --muted: #475569;
        --accent: #2563eb;
        --accent-strong: #1d4ed8;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --surface: #101a2d;
          --border: #26344f;
          --text: #e2e8f0;
          --muted: #94a3b8;
          --accent: #60a5fa;
          --accent-strong: #3b82f6;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        font-family: Inter, Geist, system-ui, sans-serif;
        background:
          radial-gradient(1000px 420px at 8% -15%, color-mix(in srgb, var(--accent) 12%, transparent), transparent),
          linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 85%, var(--surface)) 100%);
        color: var(--text);
      }

      .panel {
        width: min(560px, 100%);
        padding: 28px;
        border-radius: 22px;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow: 0 24px 56px rgba(15, 23, 42, 0.1);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 34px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .spinner {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        border: 3px solid color-mix(in srgb, var(--accent) 20%, transparent);
        border-top-color: var(--accent-strong);
        animation: spin 900ms linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .steps {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        padding: 7px 11px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: color-mix(in srgb, var(--surface) 85%, var(--bg));
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <div class="stack">
        <p class="eyebrow">Local OCR Desktop</p>
        <div class="spinner" aria-hidden="true"></div>
        <h1>Starting Local OCR</h1>
        <p>
          Local OCR is a single desktop app. The installer includes the OCR engine,
          so you do not need Docker, Python, or any command-line setup.
        </p>
        <div class="steps" aria-hidden="true">
          <span class="chip">Prepare OCR engine</span>
          <span class="chip">Start local service</span>
          <span class="chip">Open app</span>
        </div>
      </div>
    </section>
  </body>
</html>
