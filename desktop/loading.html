<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local OCR</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fbf7f2;
        --surface: #fffdf9;
        --border: #e7dccf;
        --text: #111827;
        --muted: #6f6257;
        --accent: #cc785c;
        --accent-strong: #b85f41;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #171310;
          --surface: #221b17;
          --border: #3a2e28;
          --text: #f8f3ed;
          --muted: #b2a59a;
          --accent: #ea9d7c;
          --accent-strong: #f2b08d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        font-family: Inter, Geist, system-ui, sans-serif;
        background: linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 85%, var(--surface)) 100%);
        color: var(--text);
      }

      .panel {
        width: min(560px, 100%);
        padding: 28px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow: 0 18px 48px rgba(86, 52, 33, 0.08);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 32px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .spinner {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        border: 3px solid color-mix(in srgb, var(--accent) 20%, transparent);
        border-top-color: var(--accent-strong);
        animation: spin 900ms linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .steps {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        padding: 7px 11px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: color-mix(in srgb, var(--surface) 85%, var(--bg));
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <div class="stack">
        <p class="eyebrow">Local OCR Desktop</p>
        <div class="spinner" aria-hidden="true"></div>
        <h1>Preparing the local OCR runtime</h1>
        <p>
          On first launch, Local OCR downloads and installs its own OCR runtime.
          This can take a few minutes while Python, OCRmyPDF, Tesseract, and PDF tools are prepared locally.
        </p>
        <div class="steps" aria-hidden="true">
          <span class="chip">Download runtime</span>
          <span class="chip">Install OCR tools</span>
          <span class="chip">Start Local OCR</span>
        </div>
      </div>
    </section>
  </body>
</html>
